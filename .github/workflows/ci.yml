name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/waverunner-gui/frontend/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - name: Frontend install
        working-directory: crates/waverunner-gui/frontend
        run: npm ci
      - name: Frontend audit
        working-directory: crates/waverunner-gui/frontend
        run: npm audit --audit-level=high
      - name: Frontend build
        working-directory: crates/waverunner-gui/frontend
        run: npm run build
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-features
      - name: Doc tests
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps
      - name: Package metadata
        run: cargo package --allow-dirty --workspace --no-verify

  soak:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Soak tests
        run: cargo test --workspace --all-features -- --ignored
        timeout-minutes: 15

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny || true
      - name: cargo-deny
        run: cargo deny check advisories bans licenses sources
